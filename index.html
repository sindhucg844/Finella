<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finella | Executive Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --teal: #AAC9CE;
            --purple: #B6B4C2;
            --pink: #E5C1CD;
            --dark: #2D2A32;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            overflow: hidden;
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding-left: 8%; 
        }

        /* THE WOMAN POP-UP CONTAINER */
        .woman-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 55%; /* Covers slightly more than half the right side */
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .woman-bg {
            width: 100%;
            height: 100%;
            /* Focuses on head and middle */
            background: linear-gradient(to right, var(--dark) 0%, rgba(45, 42, 50, 0.2) 60%), 
                        url('https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center top;
            
            /* THE POP-UP ANIMATION */
            opacity: 0;
            transform: translateX(100px) scale(1.1); /* Starts off-right and slightly larger */
            animation: bossPopUp 2s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            animation-delay: 0.3s;
        }

        @keyframes bossPopUp {
            0% {
                opacity: 0;
                transform: translateX(100px) scale(1.1);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        /* Left Aligned Content */
        .content {
            text-align: left;
            color: white;
            z-index: 2;
            max-width: 650px;
        }

        .brand-name {
            font-size: clamp(60px, 10vw, 110px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -3px;
            line-height: 0.85;
            margin-bottom: 20px;
        }

        .brand-name span {
            color: var(--teal);
        }

        .quote-box {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 35px;
            border-left: 4px solid var(--pink);
            padding-left: 20px;
            display: inline-block;
        }

        /* Power Button */
        .btn-main {
            display: inline-block;
            padding: 22px 75px;
            background: var(--teal);
            color: var(--dark);
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
            border-radius: 4px;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.4);
        }

        .btn-main:hover {
            transform: translateY(-8px);
            background: white;
            box-shadow: 0px 20px 50px rgba(170, 201, 206, 0.3);
        }

        .tagline-sub {
            margin-bottom: 45px;
            font-weight: 400;
            font-size: 20px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 1024px) {
            .hero { padding-left: 0; justify-content: center; }
            .content { text-align: center; padding: 20px; }
            .brand-name { font-size: 70px; }
            .woman-container { width: 100%; opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="woman-container">
            <div class="woman-bg"></div>
        </div>

        <div class="content">
            <div class="quote-box">
                "The most courageous act is still to <br> 
                think for yourself. Aloud." — <i>Finella</i>
            </div>
            
            <h1 class="brand-name">FIN<span>ELLA</span></h1>
            
            <p class="tagline-sub">
                Mastering the art of <b>Wealth & Influence.</b>
            </p>

            <a href="icon.html" class="btn-main">Claim Your Power</a>
        </div>
    </div>

</body>
</html>
